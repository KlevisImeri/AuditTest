name: Deploy GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build
        run: bun vite build
        env:
          .env: ${{ secrets.test }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v2
        permissions:
          pages: write
          id-token: write
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist